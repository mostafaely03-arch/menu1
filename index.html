<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أستاكوزا - Digital Menu</title>
    <style>
        /* --- CSS STYLES --- */
        
        /* 1. Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000; /* Black Background */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            text-align: center;
        }

        /* 2. Container for centering content */
        .container {
            max-width: 800px; /* Limits width on desktop */
            margin: 0 auto;
            padding: 20px;
        }

        /* 3. Header Section */
        header {
            padding: 40px 0 20px 0;
        }

        .logo-img {
            width: 120px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 15px;
            border-radius: 50%; /* Optional: makes logo circular */
        }

        h1 {
            font-size: 2.5rem;
            color: #d4af37; /* Gold color for "Royal" feel */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .welcome-text {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 30px;
        }

        /* 4. Social Media Section */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-icons a {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .social-icons a:hover {
            transform: scale(1.1); /* Zoom effect on hover */
        }

        .social-icons img {
            width: 40px; /* Adjust icon size */
            height: 40px;
            object-fit: contain;
        }

        /* 5. Main Menu Image Section */
        .menu-section {
            margin-bottom: 50px;
        }

        .menu-image {
            width: 100%;
            max-width: 600px; /* Keeps it from getting too huge */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); /* Subtle gold glow */
            border: 1px solid #333;
        }

        /* 6. Promotional Images Section */
        .promo-section {
            margin-bottom: 40px;
        }

        .promo-title {
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            display: inline-block;
            padding-bottom: 5px;
        }

        .promo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .promo-item {
            background-color: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .promo-item img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            display: block;
        }

        /* 7. Footer */
        footer {
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid #222;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .social-icons { gap: 15px; }
            .social-icons img { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
